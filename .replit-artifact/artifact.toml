kind = "web"
previewPath = "/"
title = "Structural Engineering App"
version = "1.0.0"
id = "artifacts/structural-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18293

[services.development]
run = "pnpm --filter @workspace/structural-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/structural-app", "run", "build" ]
publicDir = "artifacts/structural-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18293"
BASE_PATH = "/"
